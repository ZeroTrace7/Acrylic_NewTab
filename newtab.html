<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrylic — New Tab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Poppins:wght@300;400;500;600;700;800&family=Silkscreen:wght@400;700&display=swap"
  >

  <link rel="stylesheet" href="newtab.css">
</head>
<body id="app-body" class="theme-midnight">

  <!-- ── Background Layers ── -->
  <div id="bg-layer" aria-hidden="true"></div>
  <div id="bg-overlay" aria-hidden="true"></div>
  <div id="bg-grain" aria-hidden="true"></div>

  <!-- ── Dashboard ── -->
  <main id="dashboard" class="dashboard">

    <!-- Top Bar -->
    <header id="top-bar" class="top-bar">
      <div class="greeting-block">
        <p id="greeting-text" class="greeting-label font-gloria"></p>
        <p id="date-text" class="date-text"></p>
      </div>
      <div class="top-bar-actions">
        <button id="settings-btn" class="icon-btn glass-subtle" aria-label="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Center Stage — Flip Clock -->
    <section id="center-stage" class="center-stage">
      <div class="clock-wrapper">
        <div id="flip-clock" class="flip-clock" role="timer">

          <div class="flip-unit" id="flip-h1">
            <div class="flip-card">
              <span class="flip-top" id="fh1-top">0</span>
              <span class="flip-bottom" id="fh1-bot">0</span>
            </div>
          </div>
          <div class="flip-unit" id="flip-h2">
            <div class="flip-card">
              <span class="flip-top" id="fh2-top">0</span>
              <span class="flip-bottom" id="fh2-bot">0</span>
            </div>
          </div>

          <div class="flip-divider"><span></span><span></span></div>

          <div class="flip-unit" id="flip-m1">
            <div class="flip-card">
              <span class="flip-top" id="fm1-top">0</span>
              <span class="flip-bottom" id="fm1-bot">0</span>
            </div>
          </div>
          <div class="flip-unit" id="flip-m2">
            <div class="flip-card">
              <span class="flip-top" id="fm2-top">0</span>
              <span class="flip-bottom" id="fm2-bot">0</span>
            </div>
          </div>

          <div class="flip-divider"><span></span><span></span></div>

          <div class="flip-unit" id="flip-s1">
            <div class="flip-card">
              <span class="flip-top" id="fs1-top">0</span>
              <span class="flip-bottom" id="fs1-bot">0</span>
            </div>
          </div>
          <div class="flip-unit" id="flip-s2">
            <div class="flip-card">
              <span class="flip-top" id="fs2-top">0</span>
              <span class="flip-bottom" id="fs2-bot">0</span>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Search Section -->
    <section id="search-section" class="search-section">
      <div id="search-wrapper" class="search-wrapper glass">
        <div id="engine-btn" class="search-engine-btn glass-subtle" tabindex="0">
          <img id="engine-icon" alt="Search engine">
        </div>
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Search anything..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="search-submit" class="search-submit glass-subtle" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
      <div id="engine-picker" class="engine-picker glass" hidden></div>
    </section>

    <!-- Quick Links Section -->
    <section id="quicklinks-section" class="quicklinks-section">
      <div id="quicklinks-grid" class="quicklinks-grid"></div>
      <button id="add-link-btn" class="add-link-btn glass-subtle" aria-label="Add quick link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </section>

  </main>

  <!-- ── Mounts & FAB ── -->
  <button id="tools-fab" class="fab glass" aria-label="Open Quick Tools">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"></rect>
      <rect x="14" y="3" width="7" height="7"></rect>
      <rect x="3" y="14" width="7" height="7"></rect>
      <rect x="14" y="14" width="7" height="7"></rect>
    </svg>
  </button>
  <div id="tools-panel-mount"></div>
  <div id="settings-modal-mount"></div>
  <div id="onboarding-mount"></div>

  <!-- ── Toast Container ── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Entry Point ── -->
  <script type="module" src="newtab.js"></script>
</body>
</html>
