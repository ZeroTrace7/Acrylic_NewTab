<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrylic — New Tab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Poppins:wght@300;400;500;600;700;800&family=Silkscreen:wght@400;700&display=swap"
  >

  <link rel="stylesheet" href="newtab.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body id="app-body" class="theme-midnight">

  <!-- ── Background Layers ── -->
  <div id="bg-layer" aria-hidden="true"></div>
  <div id="bg-overlay" aria-hidden="true"></div>
  <div id="bg-grain" aria-hidden="true"></div>

  <!-- ── Layout Root ── -->
  <div class="layout-root">

    <!-- Top-right utility -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar-actions">
        <button id="tasks-btn" class="icon-btn glass-subtle" aria-label="Tasks">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <line x1="2" y1="20" x2="22" y2="20"></line>
            <line x1="2" y1="4" x2="14" y2="4"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Left Dock — vertically centered, absolute -->
    <aside id="left-dock" class="left-dock">
      <button id="tools-fab" class="fab glass" aria-label="Open Quick Tools">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
      </button>

      <div class="ql-pill">
        <div id="sidebar-apps-grid" class="sidebar-grid"></div>
      </div>
    </aside>

    <!-- Clock Zone -->
    <section id="clock-zone">
      <div class="clock-wrapper">
        <div id="simple-clock" class="simple-clock" role="timer" aria-label="Current time"></div>
        <div id="date-text" class="clock-date"></div>
      </div>
    </section>

    <!-- Middle Zone — greeting + search -->
    <section id="middle-zone">
      <div id="greeting-text" class="clock-greeting"></div>

      <section id="search-section" class="search-section">
        <div id="search-wrapper" class="search-wrapper glass">
          <div id="engine-btn" class="search-engine-btn glass-subtle" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
            <img id="engine-icon" src="https://www.google.com/favicon.ico" alt="Search engine">
            <svg class="engine-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Search anything..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="search-submit" class="search-submit glass-subtle" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <div id="engine-picker" class="engine-picker"></div>
        </div>
      </section>
    </section>

    <!-- Quick Links Zone -->
    <div id="quicklinks-zone" class="quicklinks-zone">
      <div id="bottom-links-grid" class="bottom-grid"></div>
      <button id="add-link-btn" class="add-link-btn glass-subtle" aria-label="Add quick link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <!-- Right Panel — off-canvas, slides in -->
    <aside id="right-panel" class="right-panel">
      <div id="tools-panel-mount"></div>
    </aside>

  </div><!-- /.layout-root -->

  <!-- ── Global Mounts ── -->
  <div id="settings-modal-mount"></div>
  <div id="onboarding-mount"></div>

  <!-- ── Toast Container ── -->
  <div id="toast-container" aria-live="polite"></div>

  <div id="bottom-left-controls" class="corner-controls bottom-left">
    <button id="focus-btn" class="icon-btn glass-subtle" aria-label="Focus Mode">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="6"></circle>
        <line x1="12" y1="2" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="2" y1="12" x2="5" y2="12"></line>
        <line x1="19" y1="12" x2="22" y2="12"></line>
      </svg>
    </button>
  </div>

  <div id="bottom-right-controls" class="corner-controls bottom-right">
    <button id="settings-btn" class="icon-btn glass-subtle" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>

    <button id="grid-view-btn" class="icon-btn glass-subtle" aria-label="Grid View">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
    </button>

    <button id="slider-settings-btn" class="icon-btn glass-subtle" aria-label="Advanced Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="21" x2="4" y2="14"></line>
        <line x1="4" y1="10" x2="4" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12" y2="3"></line>
        <line x1="20" y1="21" x2="20" y2="16"></line>
        <line x1="20" y1="12" x2="20" y2="3"></line>
        <line x1="1" y1="14" x2="7" y2="14"></line>
        <line x1="9" y1="8" x2="15" y2="8"></line>
        <line x1="17" y1="16" x2="23" y2="16"></line>
      </svg>
    </button>
  </div>

  <!-- ── Entry Point ── -->
  <script type="module" src="newtab.js"></script>
</body>
</html>
