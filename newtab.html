<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrylic — New Tab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Poppins:wght@300;400;500;600;700;800&family=Silkscreen:wght@400;700&display=swap"
  >

  <link rel="stylesheet" href="newtab.css">
</head>
<body id="app-body" class="theme-midnight">

  <!-- ── Background Layers ── -->
  <div id="bg-layer" aria-hidden="true"></div>
  <div id="bg-overlay" aria-hidden="true"></div>
  <div id="bg-grain" aria-hidden="true"></div>

  <!-- ── Layout Root ── -->
  <div class="layout-root">

    <!-- Settings overlay (top-right, position:absolute within layout-root) -->
    <header id="top-bar" class="top-bar">
      <div></div>
      <div class="top-bar-actions">
        <button id="settings-btn" aria-label="Settings" style="
          position: fixed;
          top: 16px;
          right: 16px;
          background: rgba(255,255,255,0.08);
          border: 1px solid rgba(255,255,255,0.12);
          border-radius: 12px;
          padding: 8px 12px;
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 6px;
          color: rgba(255,255,255,0.7);
        ">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Left Dock — vertically centered, absolute -->
    <aside id="left-dock" class="left-dock">
      <button id="tools-fab" class="fab glass" aria-label="Open Quick Tools">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
      </button>
    </aside>

    <!-- Clock Zone -->
    <section id="clock-zone">
      <div class="clock-wrapper">
        <div id="simple-clock" class="simple-clock" role="timer" aria-label="Current time"></div>
        <div id="date-text" class="clock-date"></div>
      </div>
    </section>

    <!-- Middle Zone — greeting + search -->
    <section id="middle-zone">
      <div id="greeting-text" class="clock-greeting"></div>

      <section id="search-section" class="search-section">
        <div id="search-wrapper" class="search-wrapper glass">
          <div id="engine-btn" class="search-engine-btn glass-subtle" tabindex="0">
            <img id="engine-icon" alt="Search engine">
          </div>
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Search anything..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="search-submit" class="search-submit glass-subtle" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
        <div id="engine-picker" class="engine-picker glass" hidden></div>
      </section>
    </section>

    <!-- Quick Links Zone -->
    <section id="quicklinks-zone">
      <section id="quicklinks-section" class="quicklinks-section">
        <div id="quicklinks-grid" class="quicklinks-grid"></div>
        <button id="add-link-btn" class="add-link-btn glass-subtle" aria-label="Add quick link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </section>
    </section>

    <!-- Right Panel — off-canvas, slides in -->
    <aside id="right-panel" class="right-panel">
      <div id="tools-panel-mount"></div>
    </aside>

  </div><!-- /.layout-root -->

  <!-- ── Global Mounts ── -->
  <div id="settings-modal-mount"></div>
  <div id="onboarding-mount"></div>

  <!-- ── Toast Container ── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Entry Point ── -->
  <script type="module" src="newtab.js"></script>
</body>
</html>
