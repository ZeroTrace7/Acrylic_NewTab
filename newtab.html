<!DOCTYPE html>
<html lang="__MSG_@@ui_locale__" dir="__MSG_@@bidi_dir__" style="color-scheme:dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrylic — New Tab</title>

  <!-- Critical: black background on first frame, before external CSS loads -->
  <style>html,body{background:#000000;margin:0;min-height:100vh;overflow:hidden}</style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Poppins:wght@300;400;500;600;700;800&family=Silkscreen:wght@400;700&display=swap"
  >
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="newtab.css?v=20260318-01">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/zen.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/quicktools.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body id="app-body" class="theme-midnight" style="background-color:#000000;">

  <!-- ── Background Layers ── -->
  <div id="theme-layer" aria-hidden="true"></div>
  <div id="bg-layer" class="anim-bg" aria-hidden="true"></div>
  <div id="bg-overlay" class="anim-bg" aria-hidden="true"></div>
  <div id="bg-grain" aria-hidden="true"></div>

  <!-- ── Layout Root ── -->
  <div class="layout-root">

    <!-- Top-right utility -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar-actions">
        <button id="tasks-btn" class="icon-btn glass-subtle" aria-label="Tasks" aria-controls="tasks-panel" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <line x1="2" y1="20" x2="22" y2="20"></line>
            <line x1="2" y1="4" x2="14" y2="4"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Left Dock — vertically centered, absolute -->
    <aside id="left-dock" class="left-dock">
      <div class="ql-pill anim-hidden anim-sidebar">
        <div id="sidebar-apps-grid" class="sidebar-grid"></div>
        <button id="tools-fab" class="fab glass" aria-label="Open quick tools" aria-expanded="false" aria-controls="right-panel">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="3.5" cy="5" r="2.8"></circle>
            <circle cx="12" cy="5" r="2.8"></circle>
            <circle cx="20.5" cy="5" r="2.8"></circle>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Clock Zone -->
    <section id="clock-zone">
      <div class="clock-wrapper anim-hidden anim-clock">
        <div id="simple-clock" class="simple-clock" role="timer" aria-label="Current time"></div>
        <div id="date-text" class="clock-date"></div>
      </div>
    </section>

    <!-- Middle Zone — greeting + search -->
    <section id="middle-zone">
      <div id="center-stack">
        <div id="greeting-text" class="clock-greeting anim-hidden anim-greeting"></div>

        <section id="search-section" class="search-section">
          <div id="search-wrapper" class="search-wrapper glass anim-hidden anim-search">
            <button type="button" id="engine-btn" class="search-engine-btn glass-subtle" aria-haspopup="listbox" aria-expanded="false">
              <img id="engine-icon" src="https://api.iconify.design/logos:google-icon.svg" alt="Google">
              <svg class="engine-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="Search anything..."
              autocomplete="off"
              spellcheck="false"
            >
            <button id="search-submit" class="search-submit glass-subtle" aria-label="Search">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
            <div id="engine-picker" class="engine-picker"></div>
            <div id="search-history-panel" class="search-history-panel" aria-hidden="true"></div>
          </div>
        </section>
      </div>
    </section>

    <!-- Quick Links Zone -->
    <div id="quicklinks-zone" class="quicklinks-zone">
      <div id="bottom-links-grid" class="bottom-grid"></div>
    </div>

    <!-- Right Panel — off-canvas, slides in -->
    <aside id="right-panel" class="right-panel">
      <div id="tools-panel-mount"></div>
    </aside>

  </div><!-- /.layout-root -->

  <!-- ── Global Mounts ── -->
  <div id="settings-modal-mount"></div>
  <div id="tasks-panel-mount"></div>
  <div id="onboarding-mount"></div>

  <!-- ── Toast Container ── -->
  <div id="toast-container" aria-live="polite"></div>

  <div id="bottom-left-controls" class="corner-controls bottom-left">
    <button id="focus-btn" class="icon-btn glass-subtle" aria-label="Focus Mode">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="16" cy="16" r="15"></circle>
        <circle cx="16" cy="16" r="6.8"></circle>
      </svg>
    </button>
  </div>

  <div id="bottom-right-controls" class="corner-controls bottom-right">
    <button id="grid-view-btn" class="icon-btn glass-subtle" aria-label="Open quick tools" aria-controls="right-panel" aria-expanded="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
    </button>

    <span class="bottom-right-divider" aria-hidden="true"></span>

    <button id="settings-btn" class="icon-btn glass-subtle" aria-label="Preferences">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- ── Entry Point ── -->
  <script type="module" src="newtab.js"></script>
</body>
</html>
